services:
  - type: web
    name: fitness-coach
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: TIMEZONE
        value: Asia/Tokyo
      - key: ENABLE_SCHEDULER
        value: false
      - key: WEB_CONCURRENCY
        value: 1
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
